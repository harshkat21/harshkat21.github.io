<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Harshith — Tape Archives</title>
<link rel="stylesheet" href="style.css" />
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Inter:wght@300;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<main class="container">
<section class="welcome">
<h1>📼 harshkat archives</h1>
<p class="subtitle">A personal music collection — no themes,genres or expectations - just music</p>

<ul class="tracklist" id="tracklist">
  <li>Loading tracks…</li>
</ul>
</section>

<section class="player" id="player">
<div class="cassette">
<div class="label">
<span id="nowPlaying">—</span>
</div>
<div class="reels">
<div class="reel left"></div>
<div class="reel right"></div>
</div>
</div>

<div class="controls">
<button onclick="prevTrack()" title="Previous"><i class="fas fa-step-backward"></i></button>
<button onclick="togglePlay()" id="playBtn" title="Play/Pause"><i class="fas fa-play"></i></button>
<button onclick="stopTrack()" title="Stop"><i class="fas fa-stop"></i></button>
<button onclick="nextTrack()" title="Next"><i class="fas fa-step-forward"></i></button>
</div>

<div class="volume-wrap">
<i class="fas fa-volume-up"></i>
<input type="range" id="volume" min="0" max="100" value="70" />
</div>

<div class="progress-wrap">
<span id="current-time">0:00</span>
<input type="range" id="progress" min="0" max="100" value="0" />
<span id="duration">0:00</span>
</div>

<div class="lyrics-container">
<button onclick="toggleLyrics()" id="lyricsBtn" title="Toggle Lyrics"><i class="fas fa-music"></i></button>
<div class="lyrics-display" id="lyricsDisplay" style="display: none;">
<pre id="lyricsText"></pre>
</div>
</div>
</section>
</main>

<script src="script.js"></script>
</body>
</html>
